<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FA66B"/>
      <stop offset="100%" stop-color="#1B5C3A"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD9A8"/>
      <stop offset="55%" stop-color="#FFB87A"/>
      <stop offset="100%" stop-color="#B7D7E8"/>
    </linearGradient>
    <linearGradient id="mountFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C8FA8"/>
      <stop offset="100%" stop-color="#5A6E8A"/>
    </linearGradient>
    <linearGradient id="mountMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6079"/>
      <stop offset="100%" stop-color="#2D425A"/>
    </linearGradient>
    <linearGradient id="mountNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B4032"/>
      <stop offset="100%" stop-color="#16261B"/>
    </linearGradient>
    <filter id="polaroidShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="photoClip">
      <rect x="-276" y="-336" width="552" height="552"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

