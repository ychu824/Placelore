        <polygon points="30,216 48,158 66,216"/>
        <polygon points="48,146 62,116 76,146"/>
        <polygon points="48,130 60,104 72,130"/>

        <polygon points="90,216 104,176 118,216"/>

        <polygon points="140,216 160,154 180,216"/>
        <polygon points="160,142 174,110 188,142"/>

