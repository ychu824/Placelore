<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8FA3"/>
      <stop offset="100%" stop-color="#5E3A8E"/>
    </linearGradient>
    <filter id="polaroidShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="photoClip">
      <rect x="-276" y="-336" width="552" height="552"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(512 540) rotate(-8)">
    <rect x="-300" y="-360" width="600" height="720" rx="20" fill="#FAFAFA" filter="url(#polaroidShadow)"/>
    <g clip-path="url(#photoClip)">
      <rect x="-276" y="-336" width="552" height="552" fill="#FFC487"/>
      <circle cx="160" cy="-220" r="56" fill="#FFD86B"/>
      <rect x="-276" y="180" width="552" height="36" fill="#3D2C5E"/>
      <rect x="-260" y="40"   width="84" height="140" fill="#3D2C5E"/>
      <rect x="-160" y="-60"  width="76" height="240" fill="#5E3A8E"/>
      <rect x="-72"  y="20"   width="86" height="160" fill="#3D2C5E"/>
      <rect x="32"   y="-100" width="72" height="280" fill="#5E3A8E"/>
      <rect x="120"  y="-30"  width="84" height="210" fill="#3D2C5E"/>
      <rect x="216"  y="60"   width="60" height="120" fill="#5E3A8E"/>
    </g>
  </g>

  <g transform="translate(770 130)">
    <path d="M0,-72 C46,-72 72,-46 72,-12 C72,34 0,108 0,108 C0,108 -72,34 -72,-12 C-72,-46 -46,-72 0,-72 Z" fill="#E63946"/>
    <circle cx="0" cy="-12" r="22" fill="#FFFFFF"/>
  </g>
</svg>
