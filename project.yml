name: PlaceNotes
options:
  bundleIdPrefix: dev.placelore
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    DEVELOPMENT_TEAM: H63486AZ9Y
    CODE_SIGN_STYLE: Automatic
  configs:
    Release:
      COPY_PHASE_STRIP: YES
      STRIP_INSTALLED_PRODUCT: YES
      DEAD_CODE_STRIPPING: YES
      VALIDATE_PRODUCT: YES

schemes:
  PlaceNotes-Debug:
    build:
      targets:
        PlaceNotes: all
        PlaceNotesTests: [test]
    test:
      config: Debug
      targets:
        - PlaceNotesTests
    run:
      config: Debug
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug

  PlaceNotes-Release:
    build:
      targets:
        PlaceNotes: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

targets:
  PlaceNotes:
    type: application
    platform: iOS
    sources:
      - PlaceNotes
    settings:
      base:
        INFOPLIST_FILE: PlaceNotes/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.placelore.app
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: 3
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Outdoor
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIcon AppIcon-Night"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        CODE_SIGN_ENTITLEMENTS: PlaceNotes/PlaceNotes.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Release:
          COPY_PHASE_STRIP: YES
          STRIP_INSTALLED_PRODUCT: YES
          DEAD_CODE_STRIPPING: YES
          VALIDATE_PRODUCT: YES
    entitlements:
      path: PlaceNotes/PlaceNotes.entitlements

  PlaceNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PlaceNotesTests
    dependencies:
      - target: PlaceNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.placelore.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PlaceNotes.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PlaceNotes"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TARGETED_DEVICE_FAMILY: "1"
